<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>Rusty Snake</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        background: #101014;
        color: #c8c8d0;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      }

      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        overflow: hidden;
        overscroll-behavior: none;
        /* Keep the game clear of notches/rounded corners on phones. */
        padding: env(safe-area-inset-top) env(safe-area-inset-right)
          env(safe-area-inset-bottom) env(safe-area-inset-left);
        box-sizing: border-box;
      }

      #game-wrap {
        /* Cap the game size so it doesn't fill a large screen, keep the game's
           aspect ratio (so there's no internal letterbox and the score bar lines
           up with the frame), and stay within the viewport on small screens.
           The ~110px subtracted from the height leaves room for #controls below.
           TWEAK: bump the 642px / 698px caps to make the game render larger. */
        width: min(100%, 642px, calc((100dvh - 110px) * 642 / 698));
        max-height: 698px;
        aspect-ratio: 642 / 698;
      }

      #bevy-canvas {
        /* fit_canvas_to_parent (set in main.rs) sizes the canvas to 100% of
           #game-wrap, so the wrapper's caps/aspect ratio drive the render size. */
        display: block;
        width: 100%;
        height: 100%;
        outline: none;
        touch-action: none;
      }

      #controls {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        line-height: 1;
        user-select: none;
      }

      #controls .row {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      #controls .group {
        display: flex;
        align-items: center;
        gap: 4px;
      }

      #controls .kbd {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 22px;
        height: 22px;
        padding: 0 5px;
        border: 1px solid #5a5a68;
        border-radius: 4px;
        background: #1b1b22;
        color: #e6e6ee;
        font-size: 12px;
      }

      #controls .label {
        color: #8a8a97;
      }

      #controls .swipe {
        color: #8a8a97;
      }
    </style>
  </head>
  <body>
    <div id="game-wrap">
      <canvas id="bevy-canvas"></canvas>
    </div>

    <div id="controls">
      <div class="row">
        <span class="group">
          <span class="kbd">↑</span>
          <span class="kbd">↓</span>
          <span class="kbd">←</span>
          <span class="kbd">→</span>
          <span class="label">Move</span>
        </span>
        <span class="group">
          <span class="kbd">Esc</span>
          <span class="label">Pause</span>
        </span>
      </div>
      <div class="swipe">Swipe to change direction on touch screens</div>
    </div>

    <script type="module">
      import init from "./rusty_snake.js";
      init();
    </script>
  </body>
</html>
